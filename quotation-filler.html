<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 報價自動填充 — ManuTrade AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080b12;--surface:#111827;--card:#1a2235;--border:#1f2d45;
  --text:#e2e8f0;--dim:#8899aa;--accent:#6366f1;--accent2:#818cf8;
  --green:#10b981;--red:#ef4444;--orange:#f59e0b;--pink:#ec4899;--radius:12px
}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{position:sticky;top:0;z-index:100;background:rgba(8,11,18,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 24px}
nav a{color:var(--dim);text-decoration:none;font-size:12px;margin-left:20px}
nav .logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.container{max-width:1100px;margin:0 auto;padding:32px 24px}
h1{font-size:26px;margin-bottom:6px}
.subtitle{color:var(--dim);font-size:13px;margin-bottom:28px}
.upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
@media(max-width:768px){.upload-grid{grid-template-columns:1fr}}
.upload-box{border:2px dashed var(--border);border-radius:var(--radius);padding:36px 24px;text-align:center;transition:all .3s;background:var(--surface);cursor:pointer}
.upload-box.drag-over{border-color:var(--accent);background:rgba(99,102,241,.05)}
.upload-box .icon{font-size:38px;margin-bottom:10px}
.upload-box .title{font-size:14px;font-weight:600;margin-bottom:4px}
.upload-box .hint{font-size:11px;color:var(--dim)}
.upload-box.file-loaded{border-color:var(--green);border-style:solid;background:rgba(16,185,129,.03)}
.upload-box.file-loaded .status-text{color:var(--green);font-size:11px;margin-top:8px}
.upload-box input{display:none}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px}
.btn{padding:11px 24px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.status{font-size:12px;padding:8px 14px;border-radius:8px;margin-bottom:16px;display:none}
.status.show{display:block}
.status.loading{background:rgba(99,102,241,.1);color:var(--accent2)}
.status.error{background:rgba(239,68,68,.1);color:var(--red)}
.status.success{background:rgba(16,185,129,.1);color:var(--green)}
.result-panel{display:none}
.result-panel.show{display:block}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
.result-card h3{font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.result-card h3 .badge{font-size:10px;padding:3px 8px;border-radius:4px}
.result-card h3 .badge.supplier{background:rgba(99,102,241,.15);color:var(--accent)}
.result-card h3 .badge.template{background:rgba(16,185,129,.15);color:var(--green)}
.field-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.field-item{display:flex;flex-direction:column;gap:3px}
.field-item label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.field-item input,.field-item textarea{padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-size:12px}
.field-item input:focus,.field-item textarea:focus{outline:none;border-color:var(--accent)}
.field-item textarea{resize:vertical;min-height:50px}
.product-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px}
.product-table th{background:var(--accent);color:#fff;padding:8px 10px;text-align:left;font-size:11px}
.product-table td{padding:7px 10px;border-bottom:1px solid var(--border)}
.product-table tr{background:var(--surface)}.product-table tr:nth-child(even){background:var(--card)}
.product-table td input{width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;background:var(--card);color:var(--text);font-size:11px}
.template-preview{border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:12px;font-size:11px}
.template-preview h4{color:var(--accent2);margin-bottom:8px}
.template-preview .tpl-field{display:inline-block;padding:3px 8px;margin:2px;background:rgba(99,102,241,.1);border-radius:4px;font-size:10px}
.template-preview .tpl-field .tpl-label{color:var(--dim)}
.template-preview .tpl-field .tpl-val{color:var(--accent2)}
.match-note{font-size:11px;color:var(--orange);margin-top:10px;padding:8px 12px;background:rgba(245,158,11,.06);border-radius:6px}
footer{padding:24px;text-align:center;font-size:11px;color:var(--dim);border-top:1px solid var(--border);margin-top:40px}
footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<nav><span class="logo">ManuTrade AI</span><a href="/">← 回主頁</a></nav>
<div class="container">
<h1>📄 AI 報價自動填充</h1>
<p class="subtitle">上傳供應商報價 + 客戶報價模板 → AI 自動提取並填入表格</p>

<div class="upload-grid">
<div class="upload-box" id="supplierBox">
<div class="icon">🧾</div><div class="title">1. 供應商報價</div>
<div class="hint">拖放 Excel / DOCX / PDF / PPT / 圖片<br>來自你嘅中國供應商</div>
<input type="file" id="supplierFile" accept=".xlsx,.xls,.docx,.pdf,.ppt,.pptx,.jpg,.jpeg,.png">
</div>
<div class="upload-box" id="templateBox">
<div class="icon">📋</div><div class="title">2. 客戶表格模板 <span style="font-size:10px;font-weight:400;color:var(--dim)">（可選）</span></div>
<div class="hint">拖放 Costco / Walmart / Target 表格<br>Excel / PDF / 圖片格式</div>
<input type="file" id="templateFile" accept=".xlsx,.xls,.docx,.pdf,.jpg,.jpeg,.png">
</div>
</div>

<div class="btn-row">
<button class="btn btn-primary" id="fillBtn" disabled>🤖 AI 提取並填充</button>
<button class="btn btn-outline" id="demoBtn">🧪 載入示範（Air Fryer→Costco）</button>
<button class="btn btn-outline" onclick="downloadResults()" id="downloadBtn" disabled>📥 下載填充數據 (.xlsx)</button>
</div>

<div class="status" id="status"></div>
<div class="result-panel" id="resultPanel"></div>
</div>
<footer><p>© 2026 <a href="/">ManuTrade AI</a> — AI 報價自動填充 · Powered by Gemini</p></footer>

<script>
var _gk='QVEuQWI4Uk42SVdMRG5XNm5zeF9yckdZbmx6RHJ3OFYxa3hQckNqM016azNKVXY1Sk91YkE=';
function gk(){return atob(_gk);}
var supplierData=null,templateData=null;

['supplierBox','templateBox'].forEach(function(id){
  var box=document.getElementById(id),input=box.querySelector('input');
  box.addEventListener('click',function(e){if(e.target.tagName!=='BUTTON')input.click();});
  box.addEventListener('dragover',function(e){e.preventDefault();box.classList.add('drag-over');});
  box.addEventListener('dragleave',function(){box.classList.remove('drag-over');});
  box.addEventListener('drop',function(e){e.preventDefault();box.classList.remove('drag-over');handleFile(e.dataTransfer.files[0],id);});
  input.addEventListener('change',function(e){handleFile(e.target.files[0],id);});
});

function handleFile(file,boxId){
  var box=document.getElementById(boxId),reader=new FileReader();
  reader.onload=function(ev){var b64=ev.target.result;
    if(boxId==='supplierBox')supplierData={name:file.name,data:b64};
    else templateData={name:file.name,data:b64};
    box.classList.add('file-loaded');var st=box.querySelector('.status-text');if(st)st.remove();
    st=document.createElement('div');st.className='status-text';st.textContent='✅ '+file.name;box.appendChild(st);
    checkReady();
  };
  reader.readAsDataURL(file);
}
function checkReady(){document.getElementById('fillBtn').disabled=!supplierData;}

document.getElementById('fillBtn').addEventListener('click',async function(){
  showStatus('loading','🤖 Gemini AI 正在提取報價數據...');
  var btn=this;btn.disabled=true;btn.textContent='⏳ 處理中...';
  try{
    var b64=supplierData.data.split(',')[1];
    var mime=supplierData.name.match(/\.(xlsx?)$/i)?'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
      :supplierData.name.match(/\.(pdf)$/i)?'application/pdf'
      :supplierData.name.match(/\.(docx?)$/i)?'application/vnd.openxmlformats-officedocument.wordprocessingml.document':'image/png';
    var resp=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+gk(),{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[
        {text:'Analyze this supplier quotation. Extract: supplier_name, contact, email, phone, payment_terms, shipping_terms, valid_until, incoterms, products (array: model, description, unit_price, moq, lead_time). Return ONLY valid JSON.'},
        {inline_data:{mime_type:mime,data:b64}}]}],
        generationConfig:{temperature:0.1,maxOutputTokens:2048}})});
    var j=await resp.json();if(j.error)throw new Error(j.error.message);
    var text=j.candidates[0].content.parts[0].text.replace(/```json/g,'').replace(/```/g,'').trim();
    renderResults({extracted:JSON.parse(text)});
    showStatus('success','✅ 提取完成！請檢查並修改以下欄位，然後下載。');document.getElementById('downloadBtn').disabled=false;
  }catch(e){showStatus('error','❌ 錯誤：'+e.message+'。請試用示範。');}
  btn.disabled=false;btn.textContent='🤖 AI 提取並填充';
});

document.getElementById('demoBtn').addEventListener('click',function(){
  var demo={extracted:{
    supplier_name:'佛山市順德區庫夫電器有限公司',contact:'Dony / +86-13516587420',email:'kufu011@sdkufu.com',
    payment_terms:'T/T 30% 訂金，70% 出貨前',shipping_terms:'FOB 深圳',valid_until:'2025-08-30',incoterms:'FOB',
    products:[{model:'AF-150SD',description:'15L 氣炸鍋烤箱，數碼控制，12 個預設程式',unit_price:32.50,moq:'500 件',lead_time:'35 天'}]
  },template_fields:{fields:[
    {label:'供應商名稱',type:'text'},{label:'型號',type:'text'},{label:'英文商品描述',type:'text'},
    {label:'法文商品描述',type:'text'},{label:'產品規格',type:'text'},{label:'UPC/EAN 條碼',type:'text'},
    {label:'加拿大 HTS 關稅編碼',type:'text'},{label:'關稅率',type:'number'},{label:'FOB 地點',type:'text'},
    {label:'原產國',type:'text'},{label:'危險品',type:'text'}
  ]}};
  renderResults(demo);document.getElementById('downloadBtn').disabled=false;
  showStatus('success','✅ 示範已載入 — Air Fryer AF-150SD 對應 Costco Canada Item Agreement');
});

function renderResults(result){
  var ex=result.extracted||{},tpl=result.template_fields,panel=document.getElementById('resultPanel');
  panel.className='result-panel show';var h='';
  h+='<div class="result-card"><h3>🏭 <span class="badge supplier">供應商數據</span></h3><div class="field-grid">';
  var fields=[['supplier_name','供應商名稱'],['contact','聯絡人'],['email','電郵'],['phone','電話'],['payment_terms','付款條款'],['shipping_terms','運輸條款'],['valid_until','有效期至'],['incoterms','貿易條款']];
  fields.forEach(function(f){h+='<div class="field-item"><label>'+f[1]+'</label><input value="'+esc(ex[f[0]]||'')+'" data-field="'+f[0]+'"></div>';});
  h+='</div>';
  var products=ex.products||[];
  h+='<table class="product-table"><thead><tr><th>型號</th><th>描述</th><th>單價</th><th>最低訂量</th><th>交期</th></tr></thead><tbody>';
  products.forEach(function(p,i){h+='<tr><td><input value="'+esc(p.model||'')+'" data-prod="'+i+'" data-pfield="model"></td><td><input value="'+esc(p.description||'')+'" data-prod="'+i+'" data-pfield="description"></td><td><input type="number" step="0.01" value="'+(p.unit_price||'')+'" data-prod="'+i+'" data-pfield="unit_price"></td><td><input value="'+esc(p.moq||'')+'" data-prod="'+i+'" data-pfield="moq"></td><td><input value="'+esc(p.lead_time||'')+'" data-prod="'+i+'" data-pfield="lead_time"></td></tr>';});
  h+='</tbody></table></div>';
  if(tpl&&tpl.fields){h+='<div class="result-card"><h3>📋 <span class="badge template">偵測到模板欄位</span></h3><div class="template-preview"><h4>AI 偵測到以下可填充欄位：</h4>';
    tpl.fields.forEach(function(f){h+='<div class="tpl-field"><span class="tpl-label">'+esc(f.label)+'</span> <span class="tpl-val">('+esc(f.type)+')</span></div>';});
    h+='</div><div class="match-note">⚠️ 自動配對功能為測試版。提交予客戶前請核對欄位配對。正式版可儲存模板設定檔，一鍵填充。</div></div>';}
  if(ex.notes||ex.additional_terms){h+='<div class="result-card"><h3>📝 附加資訊</h3><textarea style="width:100%;min-height:60px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:10px;font-size:12px">'+esc(ex.notes||ex.additional_terms||'')+'</textarea></div>';}
  panel.innerHTML=h;
}

function downloadResults(){
  var data={supplier_name:'',payment_terms:'',shipping_terms:'',products:[]};
  document.querySelectorAll('[data-field]').forEach(function(el){data[el.dataset.field]=el.value;});
  document.querySelectorAll('[data-prod]').forEach(function(el){var i=parseInt(el.dataset.prod);if(!data.products[i])data.products[i]={};data.products[i][el.dataset.pfield]=el.value;});
  var csv='\uFEFF欄位,數值\n';['supplier_name','payment_terms','shipping_terms','valid_until','incoterms','email','phone'].forEach(function(f){if(data[f])csv+=f+',"'+data[f]+'"\n';});
  csv+='\n型號,描述,單價,最低訂量,交期\n';
  data.products.forEach(function(p){if(p)csv+=[p.model||'',p.description||'',p.unit_price||'',p.moq||'',p.lead_time||''].map(function(v){return'"'+(v||'')+'"';}).join(',')+'\n';});
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'}),url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='quotation_filled.csv';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
}

function esc(s){return(String(s||'')).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showStatus(t,m){var s=document.getElementById('status');s.className='status show '+t;s.textContent=m;}
</script>
</body>
</html>
