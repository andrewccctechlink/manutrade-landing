<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 開支單掃描 — ManuTrade AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f8fafc;--surface:#ffffff;--card:#f1f5f9;--border:#e2e8f0;
  --text:#1e293b;--dim:#64748b;--accent:#6366f1;--accent2:#818cf8;
  --green:#10b981;--red:#ef4444;--orange:#f59e0b;--radius:12px
}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{position:sticky;top:0;z-index:100;background:rgba(248,250,252,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 24px}
nav a{color:var(--dim);text-decoration:none;font-size:12px;margin-left:20px}
nav .logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.container{max-width:1100px;margin:0 auto;padding:32px 24px}
h1{font-size:26px;margin-bottom:6px}
.subtitle{color:var(--dim);font-size:13px;margin-bottom:28px}
.dropzone{border:2px dashed var(--border);border-radius:var(--radius);padding:48px;text-align:center;transition:all .3s;cursor:pointer;background:var(--surface);margin-bottom:20px}
.dropzone.drag-over{border-color:var(--accent);background:rgba(99,102,241,.05)}
.dropzone .dz-icon{font-size:42px;margin-bottom:12px}
.dropzone .dz-text{font-size:14px;font-weight:600;margin-bottom:4px}
.dropzone .dz-hint{font-size:11px;color:var(--dim)}
.dropzone input{display:none}
.preview-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.preview-thumb{position:relative;width:80px;height:80px;border-radius:8px;overflow:hidden;border:2px solid var(--border)}
.preview-thumb img{width:100%;height:100%;object-fit:cover}
.preview-thumb .remove{position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:var(--red);color:#fff;border:none;cursor:pointer;font-size:12px;line-height:18px;text-align:center}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px}
.btn{padding:10px 22px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-outline{background:transparent;border:1px solid #e2e8f0;color:var(--text)}
.btn-outline:hover{border-color:var(--accent)}
.btn-export{background:var(--green);color:#fff}
.btn-export:hover{opacity:.85}
.btn-pdf{background:var(--orange);color:#fff}
.btn-pdf:hover{opacity:.85}
.btn:disabled{opacity:.5;cursor:not-allowed}
.status{font-size:12px;padding:8px 14px;border-radius:8px;margin-bottom:16px;display:none}
.status.show{display:block}
.status.scanning{background:rgba(99,102,241,.1);color:var(--accent2)}
.status.error{background:rgba(239,68,68,.1);color:var(--red)}
.status.success{background:rgba(16,185,129,.1);color:var(--green)}
.currency-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;font-size:12px;color:var(--dim)}
.currency-bar select{padding:6px 10px;border:1px solid #e2e8f0;border-radius:6px;background:var(--card);color:var(--text);font-size:12px}
.table-wrap{overflow-x:auto;margin-bottom:20px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--accent);color:#fff;padding:10px 12px;text-align:left;font-weight:600;white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr{background:var(--surface)}tr:nth-child(even){background:var(--card)}
td input,td select{width:100%;padding:5px 8px;border:1px solid #e2e8f0;border-radius:4px;background:var(--card);color:var(--text);font-size:11px}
td input:focus,td select:focus{outline:none;border-color:var(--accent)}
.amount-col{text-align:right;font-weight:600}
.empty-state{text-align:center;padding:60px 20px;color:var(--dim)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.summary{background:var(--card);border:1px solid #e2e8f0;border-radius:var(--radius);padding:16px 20px;display:flex;gap:32px;flex-wrap:wrap;align-items:center}
.summary .sum-item{text-align:center}
.summary .sum-val{font-size:22px;font-weight:800;color:var(--accent)}
.summary .sum-lbl{font-size:10px;color:var(--dim)}
footer{padding:24px;text-align:center;font-size:11px;color:var(--dim);border-top:1px solid var(--border);margin-top:40px}
footer a{color:var(--accent);text-decoration:none}
@media(max-width:600px){.btn-row{flex-direction:column}}
</style>
</head>
<body>
<nav><span class="logo">ManuTrade AI</span><a href="/">← 回主頁</a></nav>
<div class="container">
<h1>🧾 AI 開支單掃描</h1>
<p class="subtitle">拖放單據圖片 → AI 自動提取日期、商戶、金額、類別 → 一鍵匯出 Excel 或 PDF</p>

<div class="dropzone" id="dropzone">
<div class="dz-icon">📸</div>
<div class="dz-text">拖放單據圖片到呢度</div>
<div class="dz-hint">或點擊瀏覽 · 支援 JPEG、PNG、PDF、Excel、DOCX 多種格式</div>
<input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.webp,.xlsx,.xls,.docx,.doc" multiple>
</div>

<div class="preview-row" id="previewRow"></div>

  
  </div>
<div class="btn-row">
<button class="btn btn-primary" id="scanBtn" disabled>🤖 AI 掃描全部單據</button>
<button class="btn btn-outline" id="demoBtn">🧪 載入示範數據</button>
<button class="btn btn-outline" id="clearBtn">🗑️ 清除全部</button>
</div>

<div class="status" id="status"></div>

<div class="currency-bar">
💱 轉換至：
<select id="targetCurrency" onchange="updateConversion()">
<option value="HKD" selected>HKD（港幣）</option>
<option value="RMB">RMB（人民幣）</option>
<option value="USD">USD（美元）</option>
</select>
<span style="margin-left:12px">📊 <span id="receiptCount">0</span> 張單據已掃描</span>
</div>

<div class="table-wrap"><table id="receiptTable">
<thead><tr><th>#</th><th>預覽</th><th>日期</th><th>商戶</th><th>類別</th><th>項目</th><th>金額（原始）</th><th id="convHeader">金額（HKD）</th><th></th></tr></thead>
<tbody><tr class="empty-state" id="emptyRow"><td colspan="9"><div class="icon">📬</div>未有單據 — 拖放圖片然後撳掃描</td></tr></tbody>
</table></div>

<div class="summary" id="summary" style="display:none"></div>

<div class="btn-row" style="margin-top:16px">
<button class="btn btn-export" id="exportExcel" disabled>📥 匯出 Excel (.xlsx)</button>
<button class="btn btn-pdf" id="exportPdf" disabled>📄 匯出 PDF</button>
</div>
</div>
<footer><p>© 2026 <a href="/">ManuTrade AI</a> — AI 開支單掃描 · 所有單據數據安全處理</p></footer>

<script>
var _gk='c2stNzMxNWIyY2QyODMzNDU0ODhjMjYwNTFmMWM4MGE2YzQ=';
function gk(){return atob(_gk);}
document.getElementById('dropzone').addEventListener('click',function(e){if(e.target.tagName!=='BUTTON')document.getElementById('fileInput').click();});
document.getElementById('fileInput').addEventListener('change',function(e){addFiles(e.target.files);});
var dz=document.getElementById('dropzone');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',function(){dz.classList.remove('drag-over');});
dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('drag-over');addFiles(e.dataTransfer.files);});

function addFiles(flist){
  for(var i=0;i<flist.length;i++){(function(f){
    var mime=f.type||'';
    var name=f.name.toLowerCase();
    if(!mime.startsWith('image/')&&mime!=='application/pdf'&&!name.match(/\.(pdf|jpg|jpeg|png|webp|xlsx?|docx?)$/i))return;
    var gmime=mime.startsWith('image/')?'image/jpeg':mime==='application/pdf'?'application/pdf':'image/jpeg';
    var reader=new FileReader();
    reader.onload=function(ev){files.push({name:f.name,data:ev.target.result,scanned:false,fileType:gmime});renderPreviews();document.getElementById('scanBtn').disabled=false;};
    reader.readAsDataURL(f);
  })(flist[i]);}
  document.getElementById('fileInput').value='';
}

function renderPreviews(){
  var h='';files.forEach(function(f,i){h+='<div class="preview-thumb"><img src="'+f.data+'"><button class="remove" onclick="removeFile('+i+')">×</button></div>';});
  document.getElementById('previewRow').innerHTML=h;
}

function removeFile(i){
  files.splice(i,1);receipts=receipts.filter(function(r){return r.fileIndex!==i;});
  receipts.forEach(function(r){if(r.fileIndex>i)r.fileIndex--;});
  renderPreviews();renderTable();document.getElementById('scanBtn').disabled=files.length===0;
}

document.getElementById('clearBtn').addEventListener('click',function(){
  files=[];receipts=[];renderPreviews();renderTable();
  document.getElementById('scanBtn').disabled=true;document.getElementById('exportExcel').disabled=true;document.getElementById('exportPdf').disabled=true;
  document.getElementById('summary').style.display='none';
});

async function callGeminiOCR(imageDataUrl,mimeType){
  mimeType=mimeType||'image/jpeg';
  var b64=imageDataUrl.split(',')[1];
  var resp=await fetch('https://api.deepseek.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+gk()},
    body:JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:[
      {type:'text',text:'Analyze this receipt image. Extract: date (YYYY-MM-DD), merchant name, amount (number), currency (HKD/USD/RMB/CNY/EUR/etc), category (best match: Dining, Transportation, Hotel, Flight, Shipping, Office Supplies, Software/IT, Client Gift, Rent, Utilities, Phone, Insurance, Other), items (brief description). Return ONLY valid JSON.'},
      {type:'image_url',image_url:{url:'data:image/jpeg;base64,'+b64}}
    ]}],max_tokens:256,temperature:0.1})});
  var j=await resp.json();if(j.error)throw new Error(j.error.message||'API error');
  return j.choices[0].message.content.replace(/```json/g,'').replace(/```/g,'').trim();
}

function downloadBlob(blob,filename){var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);}

function exportExcel(){
  if(!receipts.length)return;var to=document.getElementById('targetCurrency').value;
  var csv='\uFEFF#,日期,商戶,類別,項目,金額（原始）,金額（'+to+'）\n';
  receipts.forEach(function(r,i){csv+=(i+1)+',"'+r.date+'","'+r.merchant+'","'+(r.category||'')+'","'+(r.items||'')+'","'+(r.currency||'')+' '+(r.amount||0)+'","'+to+' '+(r.convAmount||0).toFixed(2)+'"\n';});
  downloadBlob(new Blob([csv],{type:'text/csv;charset=utf-8'}),'expense_report.csv');
}

function exportPDF(){
  var to=document.getElementById('targetCurrency').value;
  var h='<html><head><meta charset="UTF-8"><style>body{font-family:Arial;color:#111;padding:20px}h1{color:#6366f1}table{width:100%;border-collapse:collapse}th{background:#6366f1;color:#fff;padding:8px}td{padding:6px;border-bottom:1px solid #ddd}tr:nth-child(even){background:#f5f5f5}</style></head><body>';
  h+='<h1>ManuTrade AI — 開支報表</h1><p>生成日期：'+new Date().toISOString().slice(0,10)+' | 貨幣：'+to+'</p>';
  h+='<table><thead><tr><th>#</th><th>日期</th><th>商戶</th><th>類別</th><th>金額（原始）</th><th>金額（'+to+'）</th></tr></thead><tbody>';
  receipts.forEach(function(r,i){h+='<tr><td>'+(i+1)+'</td><td>'+r.date+'</td><td>'+r.merchant+'</td><td>'+(r.category||'')+'</td><td>'+(r.currency||'')+' '+(r.amount||0)+'</td><td>'+to+' '+(r.convAmount||0).toFixed(2)+'</td></tr>';});
  h+='</tbody></table></body></html>';
  var w=window.open('','_blank');w.document.write(h);w.document.close();setTimeout(function(){w.print();},500);
}

document.getElementById('scanBtn').addEventListener('click',async function(){
  var btn=this;btn.disabled=true;btn.textContent='⏳ 掃描中...';showStatus('scanning','🤖 AI 正在掃描單據...');
  var unscanned=files.filter(function(f){return !f.scanned;});
  for(var i=0;i<unscanned.length;i++){
    var f=unscanned[i],fi=files.indexOf(f);
    showStatus('scanning','🤖 掃描第 '+(receipts.length+1)+'/'+unscanned.length+' 張單據...');
    try{var t=await callGeminiOCR(f.data,f.fileType||'image/jpeg');var d=JSON.parse(t);d.fileIndex=fi;d.thumbnail=f.data;d.origCurrency=d.currency||'HKD';d.convAmount=d.amount||0;receipts.push(d);f.scanned=true;}
    catch(e){receipts.push({fileIndex:fi,thumbnail:f.data,date:'',merchant:'掃描失敗 — 試示範',amount:0,currency:'HKD',category:'其他',items:e.message,origCurrency:'HKD',convAmount:0});}
  }
  renderTable();updateConversion();btn.textContent='🤖 AI 掃描全部單據';
  btn.disabled=files.filter(function(f){return !f.scanned;}).length===0;
  if(receipts.length>0){document.getElementById('exportExcel').disabled=false;document.getElementById('exportPdf').disabled=false;}
  hideStatus();
});

document.getElementById('demoBtn').addEventListener('click',function(){
  var demo=[{date:'2025-06-15',merchant:'翡翠拉麵小籠包',amount:856.40,currency:'HKD',category:'🍽️ 餐飲',items:'團隊午餐 — 8 人，點心'},
    {date:'2025-06-14',merchant:'Uber 香港',amount:142.50,currency:'HKD',category:'🚕 交通',items:'機場去尖沙咀'},
    {date:'2025-06-13',merchant:'深圳萬豪酒店',amount:1680.00,currency:'RMB',category:'🏨 酒店',items:'兩晚，考察工廠'},
    {date:'2025-06-12',merchant:'國泰航空',amount:4200.00,currency:'HKD',category:'✈️ 機票',items:'香港來回上海，經濟艙'},
    {date:'2025-06-10',merchant:'順豐速運',amount:380.00,currency:'RMB',category:'📦 運費',items:'樣板寄溫哥華買家'},
    {date:'2025-06-08',merchant:'Amazon Web Services',amount:89.00,currency:'USD',category:'💻 軟件/IT',items:'每月伺服器費用'},
    {date:'2025-06-05',merchant:'K11 MUSEA 禮品店',amount:520.00,currency:'HKD',category:'🎁 客戶禮物',items:'德國買家歡迎禮物'}];
  receipts=demo.map(function(d){d.origCurrency=d.currency;d.convAmount=d.amount;d.fileIndex=-1;d.thumbnail='data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"><rect fill="#1a2235" width="80" height="80"/><text fill="#6366f1" x="40" y="45" text-anchor="middle" font-size="24">🧾</text></svg>');return d;});
  renderTable();updateConversion();document.getElementById('exportExcel').disabled=false;document.getElementById('exportPdf').disabled=false;
  showStatus('success','✅ 示範數據已載入 — 7 張樣本單據。試下匯出 Excel/PDF！');
});

function renderTable(){
  var tbody=document.querySelector('#receiptTable tbody');
  document.getElementById('emptyRow').style.display=receipts.length>0?'none':'';
  document.querySelectorAll('#receiptTable tbody tr:not(#emptyRow)').forEach(function(r){r.remove();});
  var cats=['🍽️ 餐飲','🚕 交通','🏨 酒店','✈️ 機票','📦 運費','📄 文具','💻 軟件/IT','🎁 客戶禮物','🏢 租金','⚡ 水電','📱 電話','🛡️ 保險','💰 其他'];
  var catOpts=cats.map(function(c){return '<option value="'+c+'">'+c+'</option>';}).join('');
  receipts.forEach(function(r,i){
    var tr=document.createElement('tr');
    tr.innerHTML='<td>'+(i+1)+'</td><td><img src="'+r.thumbnail+'" style="width:40px;height:40px;object-fit:cover;border-radius:4px"></td>'+
      '<td><input value="'+esc(r.date||'')+'" onchange="updateField('+i+',\'date\',this.value)"></td>'+
      '<td><input value="'+esc(r.merchant||'')+'" onchange="updateField('+i+',\'merchant\',this.value)"></td>'+
      '<td><select onchange="updateField('+i+',\'category\',this.value)">'+catOpts+'</select></td>'+
      '<td><input value="'+esc(r.items||'')+'" onchange="updateField('+i+',\'items\',this.value)"></td>'+
      '<td class="amount-col"><input type="number" step="0.01" value="'+(r.amount||0)+'" onchange="updateField('+i+',\'amount\',parseFloat(this.value))"> <span style="font-size:10px;color:var(--dim)">'+esc(r.origCurrency)+'</span></td>'+
      '<td class="amount-col" style="color:var(--accent)">'+formatConv(i)+'</td>'+
      '<td><button style="background:transparent;border:none;color:var(--red);cursor:pointer;font-size:14px" onclick="removeReceipt('+i+')">×</button></td>';
    tbody.appendChild(tr);
  });
  document.getElementById('receiptCount').textContent=receipts.length;updateSummary();
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function updateField(i,f,v){receipts[i][f]=v;if(f==='amount')updateConversion();updateSummary();}
function removeReceipt(i){receipts.splice(i,1);renderTable();if(!receipts.length){document.getElementById('exportExcel').disabled=true;document.getElementById('exportPdf').disabled=true;document.getElementById('summary').style.display='none';}}
function formatConv(i){var r=receipts[i],to=document.getElementById('targetCurrency').value;return to+' '+(r.convAmount||0).toFixed(2);}
function updateConversion(){
  var to=document.getElementById('targetCurrency').value;document.getElementById('convHeader').textContent='金額（'+to+'）';
  receipts.forEach(function(r,i){r.convAmount=(r.amount||0)*(7.82/({HKD:7.82,USD:1,RMB:1.08}[to]||7.82));});
  var rows=document.querySelectorAll('#receiptTable tbody tr:not(#emptyRow)');
  rows.forEach(function(r,i){var c=r.querySelectorAll('td');if(c.length>=8)c[7].textContent=formatConv(i);});
  updateSummary();
}
function updateSummary(){
  var to=document.getElementById('targetCurrency').value,total=0,cats={};
  receipts.forEach(function(r){total+=(r.amount||0);var c=(r.category||'其他').replace(/^[^\s]+\s/,'');cats[c]=(cats[c]||0)+(r.amount||0);});
  var sum=document.getElementById('summary');sum.style.display=receipts.length>0?'flex':'none';
  sum.innerHTML='<div class="sum-item"><div class="sum-val">'+receipts.length+'</div><div class="sum-lbl">張單據</div></div><div class="sum-item"><div class="sum-val">HKD '+(total*7.82).toFixed(2)+'</div><div class="sum-lbl">總計（~港幣）</div></div><div class="sum-item"><div class="sum-val">'+Object.keys(cats).length+'</div><div class="sum-lbl">類別</div></div>';
}

document.getElementById('exportExcel').addEventListener('click',exportExcel);
document.getElementById('exportPdf').addEventListener('click',exportPDF);

function showStatus(t,m){var s=document.getElementById('status');s.className='status show '+t;s.textContent=m;}
function hideStatus(){document.getElementById('status').classList.remove('show');}
</script>
</body>
</html>
